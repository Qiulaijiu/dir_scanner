[general]
threads = 30
recursive = False
deep-recursive = False
force-recursive = False
recursion-status = 200-399,401,403
max-recursion-depth = 0
random-user-agents = False
max-time = 0
exit-on-error = False

[dictionary]
default-extensions = php,jsp,asp,aspx,html,js
force-extensions = False
overwrite-extensions = False
lowercase = False
uppercase = False
capitalization = False

[request]
http-method = GET
follow-redirects = False

[connection]
timeout = 10
delay = 0
max-rate = 0
max-retries = 1

[waf-bypass]
enabled = False
random-ua = True
ip-headers = True
path-mix = True
junk-params = True

[view]
full-url = False
quiet-mode = False
color = True

[output]
report-format = plain
autosave-report = False
